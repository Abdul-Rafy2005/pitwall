server.port=8080
spring.application.name=pitwall-backend

# Load application-local.properties for local dev (gitignored, holds real keys).
# Run with: -Dspring.profiles.active=local
# At deployment set GROQ_API_KEY and YOUTUBE_API_KEY as env vars instead.
spring.config.import=optional:classpath:application-local.properties

# Redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}

# CORS - allow React frontend
cors.allowed.origins=http://localhost:3000

# API Keys - set these as environment variables, never hardcode here
# Local dev: create pitwall-backend/application-local.properties (gitignored) with:
#   groq.api.key=gsk_...
#   youtube.api.key=AIza...
# Or export GROQ_API_KEY and YOUTUBE_API_KEY in your shell before running.
youtube.api.key=${YOUTUBE_API_KEY}
groq.api.key=${GROQ_API_KEY}

# OpenF1 base URL
openf1.base.url=https://api.openf1.org/v1

# Scheduling
timing.poll.interval=2000
